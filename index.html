<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZERO-X GOD MODE</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:'Segoe UI',sans-serif;
    color:#00f2ff;
}
/* HUD */
#hud{
    position:fixed;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:10;
    width:100%;
    font-size:24px;
    letter-spacing:4px;
    text-shadow:0 0 15px #00f2ff;
    font-weight:bold;
}
#status{
    margin-top:10px;
    font-size:14px;
    color:rgba(0,242,255,.7);
}
/* BOTÃO */
#start{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:18px 45px;
    border-radius:50px;
    border:2px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px #00f2ff;
    transition:.3s;
    z-index:20;
}
#start:hover{
    background:#00f2ff;
    color:#000;
}
canvas{
    display:block;
}
</style>
</head>
<body>
<div id="hud">
    ZERO-X V_4
    
    <div id="status">
        Sistema aguardando inicialização...
    </div>
</div>
<button id="start">
    INICIALIZAR ZERO-X
</button>
<div id="player"></div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// =====================================================
// CONFIG
// =====================================================
const YOUTUBE_API_KEY =
"AIzaSyApmJHahtrbmxS-hsVApE37qmHBVP67Du8";
let player;
let recognition;
let synth = window.speechSynthesis;
let falando = false;
let explosionFactor = 1;
let targetExplosion = 1;
const status =
document.getElementById("status");
// =====================================================
// MEMÓRIA
// =====================================================
let compromissos = [];
// =====================================================
// MICROFONE
// =====================================================
let audioContext;
let analyser;
let microphone;
let dataArray;
async function iniciarMic(){
    const stream =
    await navigator.mediaDevices.getUserMedia({
        audio:true
    });
    audioContext =
    new AudioContext();
    analyser =
    audioContext.createAnalyser();
    analyser.fftSize = 256;
    const bufferLength =
    analyser.frequencyBinCount;
    dataArray =
    new Uint8Array(bufferLength);
    microphone =
    audioContext.createMediaStreamSource(stream);
    microphone.connect(analyser);
}
// =====================================================
// FALAR
// =====================================================
function falar(texto){
    falando = true;
    if(synth.speaking){
        synth.cancel();
    }
    let u =
    new SpeechSynthesisUtterance(texto);
    u.lang = "pt-BR";
    u.rate = 1.1;
    u.pitch = 0.9;
    u.onend = ()=>{
        falando = false;
    };
    synth.speak(u);
    status.innerText =
    "ZERO-X: " + texto;
}
// =====================================================
// YOUTUBE
// =====================================================
function onYouTubeIframeAPIReady(){
    player = new YT.Player('player',{
        height:'0',
        width:'0',
        events:{
            onReady:e=>{
                e.target.mute();
            },
            onStateChange:e=>{
                if(e.data === 1){
                    targetExplosion = 2;
                }else{
                    targetExplosion = 1;
                }
            }
        }
    });
}
// =====================================================
// TOCAR MÚSICA
// =====================================================
async function tocar(termoOriginal){
    let termo = termoOriginal
    .replace(/zero\s?x|zerox|xis/gi,"")
    .trim();
    if(!termo){
        falar("Diga o nome da música.");
        return;
    }
    falar("Buscando " + termo);
    try{
        const res = await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=id&q=${encodeURIComponent(termo)}&type=video&maxResults=1&key=${YOUTUBE_API_KEY}`);
        const data = await res.json();
        if(data.items && data.items[0]){
            const id =
            data.items[0].id.videoId;
            player.loadVideoById(id);
            setTimeout(()=>{
                player.unMute();
                player.setVolume(100);
                player.playVideo();
            },500);
            falar("Tocando agora.");
        }else{
            falar(
            "Não encontrei resultados."
            );
        }
    }catch{
        falar(
        "Erro ao buscar música."
        );
    }
}
// =====================================================
// CÉREBRO
// =====================================================
function responder(fala){
    console.log("Você disse:",fala);
    fala = fala.toLowerCase();
    fala = fala
    .replace(/zero\s?x|zerox|xis/gi,"")
    .trim();
    // =========================================
    // HORAS
    // =========================================
    if(
        fala.includes("hora") ||
        fala.includes("horas") ||
        fala.includes("que horas") ||
        fala.includes("qual a hora")
    ){
        const agora =
        new Date().toLocaleTimeString(
            "pt-BR",
            {
                hour:"2-digit",
                minute:"2-digit"
            }
        );
        falar(
        "Agora são " + agora
        );
        return;
    }
    // =========================================
    // DATA
    // =========================================
    if(
        fala.includes("data") ||
        fala.includes("dia de hoje")
    ){
        const hoje =
        new Date().toLocaleDateString(
            "pt-BR"
        );
        falar(
        "Hoje é " + hoje
        );
        return;
    }
    // =========================================
    // TOCAR MÚSICA
    // =========================================
    if(
        fala.includes("toca") ||
        fala.includes("coloca") ||
        fala.includes("reproduz")
    ){
        let musica = fala
        .replace("toca","")
        .replace("coloca","")
        .replace("reproduz","")
        .trim();
        tocar(musica);
        return;
    }
    // =========================================
    // PAUSAR MÚSICA
    // =========================================
    if(
        fala.includes("parar") ||
        fala.includes("pausa") ||
        fala.includes("desligar música")
    ){
        if(player){
            player.pauseVideo();
        }
        falar(
        "Música pausada."
        );
        return;
    }
    // =========================================
    // CORES
    // =========================================
    if(fala.includes("vermelho")){
        globe.material.color.setHex(
        0xff0000
        );
        falar(
        "Modo vermelho ativado."
        );
        return;
    }
    if(fala.includes("verde")){
        globe.material.color.setHex(
        0x00ff00
        );
        falar(
        "Modo verde ativado."
        );
        return;
    }
    if(fala.includes("azul")){
        globe.material.color.setHex(
        0x00f2ff
        );
        falar(
        "Modo azul ativado."
        );
        return;
    }
    if(fala.includes("roxo")){
        globe.material.color.setHex(
        0x8a2be2
        );
        falar(
        "Modo roxo ativado."
        );
        return;
    }
    // =========================================
    // AGENDAR
    // =========================================
    if(
        fala.includes("agendar") ||
        fala.includes("novo compromisso")
    ){
        let compromisso =
        fala
        .replace("agendar","")
        .replace("novo compromisso","")
        .trim();
        if(compromisso){
            compromissos.push(compromisso);
            falar(
            "Compromisso salvo."
            );
        }else{
            falar(
            "Diga o compromisso."
            );
        }
        return;
    }
    // =========================================
    // LISTAR COMPROMISSOS
    // =========================================
    if(
        fala.includes("meus compromissos") ||
        fala.includes("listar compromissos")
    ){
        if(compromissos.length === 0){
            falar(
            "Você não possui compromissos."
            );
        }else{
            falar(
            compromissos.join(", ")
            );
        }
        return;
    }
    // =========================================
    // QUEM É VOCÊ
    // =========================================
    if(
        fala.includes("quem é você") ||
        fala.includes("o que é você")
    ){
        falar(
        "Eu sou o sistema ZERO X."
        );
        return;
    }
    // =========================================
    // RESPOSTA PADRÃO
    // =========================================
    falar(
    "Comando não reconhecido."
    );
}
// =====================================================
// RECONHECIMENTO DE VOZ
// =====================================================
function iniciarVoz(){
    const Speech =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;
    recognition =
    new Speech();
    recognition.lang = "pt-BR";
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;
    recognition.onresult = e=>{
        if(falando) return;
        const resultado =
        e.results[
            e.results.length - 1
        ];
        if(!resultado.isFinal) return;
        const fala =
        resultado[0]
        .transcript
        .toLowerCase();
        responder(fala);
    };
    recognition.onerror = e=>{
        console.log(e.error);
    };
    recognition.onend = ()=>{
        setTimeout(()=>{
            recognition.start();
        },300);
    };
    recognition.start();
}
// =====================================================
// THREE JS
// =====================================================
const scene =
new THREE.Scene();
const camera =
new THREE.PerspectiveCamera(
75,
innerWidth/innerHeight,
0.1,
1000
);
camera.position.z = 5;
const renderer =
new THREE.WebGLRenderer({
    alpha:true,
    antialias:false
});
renderer.setPixelRatio(1);
renderer.setSize(
innerWidth,
innerHeight
);
document.body.appendChild(
renderer.domElement
);
// =====================================================
// GLOBO
// =====================================================
const geo =
new THREE.SphereGeometry(
1.6,
24,
24
);
const base =
geo.attributes.position.array.slice();
const globe =
new THREE.Points(
    geo,
    new THREE.PointsMaterial({
        color:0x00f2ff,
        size:0.02
    })
);
scene.add(globe);
// =====================================================
// PARTÍCULAS
// =====================================================
const pGeo =
new THREE.BufferGeometry();
const arr =
new Float32Array(500*3);
for(let i=0;i<arr.length;i++){
    arr[i] =
    (Math.random()-0.5)*20;
}
pGeo.setAttribute(
    'position',
    new THREE.BufferAttribute(
        arr,
        3
    )
);
const particles =
new THREE.Points(
    pGeo,
    new THREE.PointsMaterial({
        size:0.02,
        color:0x00f2ff
    })
);
scene.add(particles);
// =====================================================
// ANIMAÇÃO
// =====================================================
let pulse = 1;
function animate(){
    requestAnimationFrame(
    animate
    );
    pulse += 0.05;
    let micForce = 1;
    if(analyser){
        analyser.getByteFrequencyData(
        dataArray
        );
        let sum = 0;
        for(
            let i=0;
            i<dataArray.length;
            i++
        ){
            sum += dataArray[i];
        }
        let average =
        sum / dataArray.length;
        micForce =
        1 + (average / 80);
    }
    explosionFactor +=
    (targetExplosion - explosionFactor)
    * 0.08;
    const attr =
    globe.geometry
    .attributes.position;
    for(
        let i=0;
        i<attr.count;
        i+=2
    ){
        const scale =
        (explosionFactor * micForce)
        +
        Math.sin(
            i+pulse
        ) * 0.05;
        attr.setXYZ(
            i,
            base[i*3]*scale,
            base[i*3+1]*scale,
            base[i*3+2]*scale
        );
    }
    attr.needsUpdate = true;
    globe.material.size =
    0.015 +
    (micForce * 0.01);
    globe.rotation.y += 0.003;
    particles.rotation.y += 0.0005;
    renderer.render(
        scene,
        camera
    );
}
animate();
// =====================================================
// START
// =====================================================
document.getElementById("start")
.onclick = async ()=>{
    document.getElementById("start")
    .style.display = "none";
    await iniciarMic();
    falar(
    "Zero Xis ativado."
    );
    iniciarVoz();
    if(player){
        player.unMute();
    }
};
// =====================================================
// RESIZE
// =====================================================
window.addEventListener(
'resize',
()=>{
    camera.aspect =
    innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(
        innerWidth,
        innerHeight
    );
});
</script>
</body>
</html>
