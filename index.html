<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEROX GOD MODE</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:'Segoe UI',sans-serif;
    color:#00f2ff;
}
#hud{
    position:fixed;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:10;
    width:100%;
    font-size:24px;
    letter-spacing:4px;
    text-shadow:0 0 15px #00f2ff;
    font-weight:bold;
}
#status{
    margin-top:10px;
    font-size:14px;
    color:rgba(0,242,255,.7);
}
#start{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:18px 45px;
    border-radius:50px;
    border:2px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px #00f2ff;
    transition:.3s;
    z-index:20;
}
#start:hover{
    background:#00f2ff;
    color:#000;
}
canvas{
    display:block;
}
</style>
</head>
<body>
<div id="hud">
    ZERO-X V_3
    <div id="status"></div>
</div>
<button id="start">
    INICIALIZAR ZERO-X
</button>
<div id="player"></div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ================= CONFIG =================
const YOUTUBE_API_KEY =
"AIzaSyApmJHahtrbmxS-hsVApE37qmHBVP67Du8";
let player;
let recognition;
let synth = window.speechSynthesis;
let falando = false;
let explosionFactor = 1;
let targetExplosion = 1;
// ================= MICROFONE =================
let audioContext;
let analyser;
let microphone;
let dataArray;
async function iniciarMic(){
    const stream =
    await navigator.mediaDevices.getUserMedia({
        audio:true
    });
    audioContext = new AudioContext();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    const bufferLength =
    analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    microphone =
    audioContext.createMediaStreamSource(stream);
    microphone.connect(analyser);
}
// ================= VOZ IA =================
function falar(texto){
    falando = true;
    synth.cancel();
    let u =
    new SpeechSynthesisUtterance(texto);
    u.lang = "pt-BR";
    u.rate = 1.1;
    u.onend = ()=>{
        falando = false;
    };
    synth.speak(u);
    document.getElementById("status")
    .innerText = "ZERO-X: " + texto;
}
// ================= YOUTUBE =================
function onYouTubeIframeAPIReady(){
    player = new YT.Player('player',{
        height:'0',
        width:'0',
        events:{
            onReady:e=>e.target.mute(),
            onStateChange:e=>{
                if(e.data === 1){
                    targetExplosion = 1.8;
                }else{
                    targetExplosion = 1;
                }
            }
        }
    });
}
async function tocar(termoOriginal){
    let termo = termoOriginal
    .replace(/zero\s?x|zerox|xis/gi,"")
    .trim();
    if(!termo) return;
    falar("Buscando " + termo);
    const res = await fetch(
    `https://www.googleapis.com/youtube/v3/search?part=id&q=${encodeURIComponent(termo)}&type=video&maxResults=1&key=${YOUTUBE_API_KEY}`);
    const data = await res.json();
    if(data.items && data.items[0]){
        const id =
        data.items[0].id.videoId;
        player.loadVideoById(id);
        setTimeout(()=>{
            player.unMute();
            player.playVideo();
        },500);
        falar("Tocando agora.");
    }else{
        falar("Não encontrei resultados.");
    }
}
// ================= RESPOSTAS =================
function responder(fala){
    console.log("Comando:",fala);
    // CORES
    if(fala.includes("vermelho")){
        globe.material.color.setHex(0xff0000);
        falar("Alterando para vermelho.");
    }
    else if(fala.includes("verde")){
        globe.material.color.setHex(0x00ff00);
        falar("Alterando para verde.");
    }
    else if(fala.includes("azul")){
        globe.material.color.setHex(0x00f2ff);
        falar("Restaurando azul.");
    }
    else if(fala.includes("roxo")){
        globe.material.color.setHex(0x8a2be2);
        falar("Alterando para roxo.");
    }
    else if(fala.includes("branco")){
        globe.material.color.setHex(0xffffff);
        falar("Alterando para branco.");
    }
    // MÚSICA
    else if(fala.includes("toca")){
        let musica =
        fala.split("toca")[1].trim();
        tocar(musica);
    }
    // COMANDOS
    else if(
        fala.includes("quem é você")
    ){
        falar(
        "Eu sou o ZERO-X."
        );
    }
    else if(
        fala.includes("hora")
    ){
        falar(
        "Agora são " +
        new Date().toLocaleTimeString()
        );
    }
    else if(
        fala.includes("parar")
    ){
        player.pauseVideo();
        falar(
        "Música interrompida."
        );
    }
    else if(
        fala.includes("zero x") ||
        fala.includes("zerox")
    ){
        falar(
        "Sim. Estou ouvindo."
        );
    }
}
// ================= RECONHECIMENTO =================
function iniciarVoz(){
    const Speech =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;
    recognition = new Speech();
    recognition.lang = "pt-BR";
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.onresult = e=>{
        if(falando) return;
        const fala =
        e.results[
            e.results.length-1
        ][0]
        .transcript
        .toLowerCase();
        responder(fala);
    };
    recognition.onend = ()=>{
        recognition.start();
    };
    recognition.start();
}
// ================= THREE JS =================
const scene = new THREE.Scene();
const camera =
new THREE.PerspectiveCamera(
75,
innerWidth/innerHeight,
0.1,
1000
);
camera.position.z = 5;
const renderer =
new THREE.WebGLRenderer({
    alpha:true,
    antialias:false
});
renderer.setPixelRatio(1);
renderer.setSize(
innerWidth,
innerHeight
);
document.body.appendChild(
renderer.domElement
);
// ================= GLOBO =================
const geo =
new THREE.SphereGeometry(
1.6,
24,
24
);
const base =
geo.attributes.position.array.slice();
const globe =
new THREE.Points(
    geo,
    new THREE.PointsMaterial({
        color:0x00f2ff,
        size:0.02
    })
);
scene.add(globe);
// ================= PARTÍCULAS =================
const pGeo =
new THREE.BufferGeometry();
const arr =
new Float32Array(500*3);
for(let i=0;i<arr.length;i++){
    arr[i] =
    (Math.random()-0.5)*20;
}
pGeo.setAttribute(
'position',
new THREE.BufferAttribute(arr,3)
);
const particles =
new THREE.Points(
    pGeo,
    new THREE.PointsMaterial({
        size:0.02,
        color:0x00f2ff
    })
);
scene.add(particles);
// ================= ANIMAÇÃO =================
let pulse = 1;
function animate(){
    requestAnimationFrame(animate);
    pulse += 0.05;
    // MICROFONE
    let micForce = 1;
    if(analyser){
        analyser.getByteFrequencyData(
            dataArray
        );
        let sum = 0;
        for(let i=0;i<dataArray.length;i++){
            sum += dataArray[i];
        }
        let average =
        sum / dataArray.length;
        micForce =
        1 + (average / 80);
    }
    explosionFactor +=
    (targetExplosion - explosionFactor)
    * 0.08;
    const attr =
    globe.geometry.attributes.position;
    for(let i=0;i<attr.count;i+=2){
        const scale =
        (explosionFactor * micForce)
        +
        Math.sin(i+pulse)*0.05;
        attr.setXYZ(
            i,
            base[i*3]*scale,
            base[i*3+1]*scale,
            base[i*3+2]*scale
        );
    }
    attr.needsUpdate = true;
    globe.material.size =
    0.015 + (micForce * 0.01);
    globe.rotation.y += 0.003;
    particles.rotation.y += 0.0005;
    renderer.render(scene,camera);
}
animate();
// ================= START =================
document.getElementById("start")
.onclick = async ()=>{
    document.getElementById("start")
    .style.display = "none";
    await iniciarMic();
    falar(
    "Zero Xis ativado."
    );
    iniciarVoz();
    if(player){
        player.unMute();
    }
};
// ================= RESIZE =================
window.addEventListener(
'resize',
()=>{
    camera.aspect =
    innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(
    innerWidth,
    innerHeight
    );
});
</script>
</body>
</html>
