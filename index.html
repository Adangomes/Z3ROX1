<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZERO-X GOD MODE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    font-family:'Segoe UI',sans-serif;
    color:#00f2ff;
}

/* HUD */

#hud{
    position:fixed;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:10;
    width:100%;
    pointer-events:none;
}

#title{
    font-size:28px;
    letter-spacing:6px;
    font-weight:bold;
    text-shadow:0 0 20px #00f2ff;
}

#status{
    margin-top:12px;
    font-size:15px;
    color:rgba(0,242,255,.8);
}

/* BOTÃO */

#start{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:18px 45px;
    border-radius:50px;
    border:2px solid #00f2ff;
    background:transparent;
    color:#00f2ff;
    font-weight:bold;
    font-size:15px;
    letter-spacing:2px;
    cursor:pointer;
    box-shadow:0 0 25px #00f2ff;
    transition:.3s;
    z-index:20;
}

#start:hover{
    background:#00f2ff;
    color:#000;
}

canvas{
    display:block;
}

</style>
</head>

<body>

<div id="hud">

    <div id="title">
        ZERO-X V4
    </div>

    <div id="status">
        Sistema aguardando inicialização...
    </div>

</div>

<button id="start">
    INICIALIZAR ZERO-X
</button>

<div id="player"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>

// ======================================================
// CONFIG
// ======================================================

const status =
document.getElementById("status");

let recognition;
let synth =
window.speechSynthesis;

let falando = false;

let player;

let compromissos = [];

let explosionFactor = 1;
let targetExplosion = 1;

// ======================================================
// MICROFONE
// ======================================================

let audioContext;
let analyser;
let microphone;
let dataArray;

async function iniciarMic(){

    const stream =
    await navigator.mediaDevices.getUserMedia({
        audio:true
    });

    audioContext =
    new AudioContext();

    analyser =
    audioContext.createAnalyser();

    analyser.fftSize = 256;

    const bufferLength =
    analyser.frequencyBinCount;

    dataArray =
    new Uint8Array(bufferLength);

    microphone =
    audioContext.createMediaStreamSource(stream);

    microphone.connect(analyser);

}

// ======================================================
// FALAR
// ======================================================

function falar(texto){

    falando = true;

    if(synth.speaking){
        synth.cancel();
    }

    let u =
    new SpeechSynthesisUtterance(texto);

    u.lang = "pt-BR";
    u.rate = 1;
    u.pitch = 0.9;

    u.onend = ()=>{
        falando = false;
    };

    synth.speak(u);

    status.innerText =
    "ZERO-X: " + texto;

}

// ======================================================
// YOUTUBE
// ======================================================

function onYouTubeIframeAPIReady(){

    player =
    new YT.Player('player',{

        height:'0',
        width:'0',

        events:{

            onReady:e=>{

                e.target.setVolume(100);

            },

            onStateChange:e=>{

                if(e.data === 1){

                    targetExplosion = 2;

                }else{

                    targetExplosion = 1;

                }

            }

        }

    });

}

// ======================================================
// TOCAR MÚSICA
// ======================================================

async function tocarMusica(nome){

    try{

        falar("Pesquisando " + nome);

        const pesquisa =
        encodeURIComponent(nome);

        player.loadVideoById({
            videoId:"dQw4w9WgXcQ"
        });

        setTimeout(()=>{

            player.playVideo();

        },1000);

        falar("Tocando agora.");

    }catch{

        falar("Erro ao tocar música.");

    }

}

// ======================================================
// CÉREBRO
// ======================================================

function responder(fala){

    console.log("Você falou:", fala);

    fala = fala.toLowerCase();

    fala = fala
    .replace(
    /zero\s?x|zerox|zero xis|xis/gi,
    ""
    )
    .trim();

    // ==================================================
    // HORAS
    // ==================================================

    if(
        fala.includes("hora")
    ){

        const agora =
        new Date().toLocaleTimeString(
            "pt-BR",
            {
                hour:"2-digit",
                minute:"2-digit"
            }
        );

        falar(
        "Agora são " + agora
        );

        return;
    }

    // ==================================================
    // DATA
    // ==================================================

    if(
        fala.includes("data") ||
        fala.includes("dia")
    ){

        const hoje =
        new Date().toLocaleDateString(
            "pt-BR"
        );

        falar(
        "Hoje é " + hoje
        );

        return;
    }

    // ==================================================
    // TOCAR MÚSICA
    // ==================================================

    if(
        fala.includes("toca") ||
        fala.includes("coloca")
    ){

        let musica =
        fala
        .replace("toca","")
        .replace("coloca","")
        .trim();

        if(!musica){

            falar(
            "Diga o nome da música."
            );

            return;
        }

        tocarMusica(musica);

        return;

    }

    // ==================================================
    // PARAR MÚSICA
    // ==================================================

    if(
        fala.includes("parar") ||
        fala.includes("pausa")
    ){

        if(player){

            player.pauseVideo();

        }

        falar(
        "Música pausada."
        );

        return;

    }

    // ==================================================
    // CORES
    // ==================================================

    if(fala.includes("vermelho")){

        globe.material.color.setHex(
        0xff0000
        );

        falar(
        "Modo vermelho ativado."
        );

        return;

    }

    if(fala.includes("verde")){

        globe.material.color.setHex(
        0x00ff00
        );

        falar(
        "Modo verde ativado."
        );

        return;

    }

    if(fala.includes("roxo")){

        globe.material.color.setHex(
        0x8a2be2
        );

        falar(
        "Modo roxo ativado."
        );

        return;

    }

    if(fala.includes("azul")){

        globe.material.color.setHex(
        0x00f2ff
        );

        falar(
        "Modo azul ativado."
        );

        return;

    }

    // ==================================================
    // AGENDAR
    // ==================================================

    if(
        fala.includes("agendar")
    ){

        let compromisso =
        fala
        .replace("agendar","")
        .trim();

        if(compromisso){

            compromissos.push(
            compromisso
            );

            falar(
            "Compromisso salvo."
            );

        }else{

            falar(
            "Diga o compromisso."
            );

        }

        return;

    }

    // ==================================================
    // LISTAR
    // ==================================================

    if(
        fala.includes("meus compromissos")
    ){

        if(compromissos.length === 0){

            falar(
            "Você não possui compromissos."
            );

        }else{

            falar(
            compromissos.join(", ")
            );

        }

        return;

    }

    // ==================================================
    // IDENTIDADE
    // ==================================================

    if(
        fala.includes("quem é você")
    ){

        falar(
        "Eu sou o sistema Zero X."
        );

        return;

    }

    // ==================================================
    // RESPOSTA PADRÃO
    // ==================================================

    falar(
    "Comando não reconhecido."
    );

}

// ======================================================
// RECONHECIMENTO DE VOZ
// ======================================================

function iniciarVoz(){

    const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

    if(!SpeechRecognition){

        alert(
        "Seu navegador não suporta reconhecimento de voz."
        );

        return;

    }

    recognition =
    new SpeechRecognition();

    recognition.lang = "pt-BR";

    recognition.continuous = true;

    recognition.interimResults = false;

    recognition.maxAlternatives = 1;

    recognition.onstart = ()=>{

        console.log(
        "Reconhecimento iniciado"
        );

        status.innerText =
        "Microfone ativo...";

    };

    recognition.onresult = (e)=>{

        if(falando) return;

        const fala =
        e.results[
            e.results.length - 1
        ][0]
        .transcript
        .toLowerCase();

        console.log(
        "Você disse:",
        fala
        );

        status.innerText =
        "Você: " + fala;

        responder(fala);

    };

    recognition.onerror = (e)=>{

        console.log(
        "Erro:",
        e.error
        );

        status.innerText =
        "Erro: " + e.error;

    };

    recognition.onend = ()=>{

        console.log(
        "Reiniciando reconhecimento..."
        );

        setTimeout(()=>{

            recognition.start();

        },500);

    };

    recognition.start();

}

// ======================================================
// THREE JS
// ======================================================

const scene =
new THREE.Scene();

const camera =
new THREE.PerspectiveCamera(
75,
innerWidth/innerHeight,
0.1,
1000
);

camera.position.z = 5;

const renderer =
new THREE.WebGLRenderer({
    alpha:true,
    antialias:true
});

renderer.setSize(
innerWidth,
innerHeight
);

document.body.appendChild(
renderer.domElement
);

// ======================================================
// GLOBO
// ======================================================

const geo =
new THREE.SphereGeometry(
1.6,
32,
32
);

const base =
geo.attributes.position.array.slice();

const globe =
new THREE.Points(
    geo,
    new THREE.PointsMaterial({
        color:0x00f2ff,
        size:0.02
    })
);

scene.add(globe);

// ======================================================
// PARTÍCULAS
// ======================================================

const pGeo =
new THREE.BufferGeometry();

const arr =
new Float32Array(1000 * 3);

for(let i=0;i<arr.length;i++){

    arr[i] =
    (Math.random()-0.5)*30;

}

pGeo.setAttribute(
'position',
new THREE.BufferAttribute(
    arr,
    3
)
);

const particles =
new THREE.Points(
    pGeo,
    new THREE.PointsMaterial({
        color:0x00f2ff,
        size:0.02
    })
);

scene.add(particles);

// ======================================================
// ANIMAÇÃO
// ======================================================

let pulse = 0;

function animate(){

    requestAnimationFrame(
    animate
    );

    pulse += 0.05;

    let micForce = 1;

    if(analyser){

        analyser.getByteFrequencyData(
        dataArray
        );

        let sum = 0;

        for(
            let i=0;
            i<dataArray.length;
            i++
        ){

            sum += dataArray[i];

        }

        let average =
        sum / dataArray.length;

        micForce =
        1 + average / 80;

    }

    explosionFactor +=
    (
        targetExplosion -
        explosionFactor
    ) * 0.08;

    const attr =
    globe.geometry.attributes.position;

    for(
        let i=0;
        i<attr.count;
        i++
    ){

        const scale =
        (
            explosionFactor *
            micForce
        ) +
        Math.sin(
            i + pulse
        ) * 0.03;

        attr.setXYZ(

            i,

            base[i*3] * scale,

            base[i*3+1] * scale,

            base[i*3+2] * scale

        );

    }

    attr.needsUpdate = true;

    globe.rotation.y += 0.003;

    particles.rotation.y += 0.0005;

    renderer.render(
        scene,
        camera
    );

}

animate();

// ======================================================
// START
// ======================================================

document.getElementById("start")
.onclick = async ()=>{

    try{

        document.getElementById(
        "start"
        ).style.display = "none";

        await iniciarMic();

        iniciarVoz();

        falar(
        "Zero X ativado."
        );

        status.innerText =
        "Sistema online";

    }catch(err){

        console.log(err);

        alert(
        "Permita o uso do microfone."
        );

    }

};

// ======================================================
// RESIZE
// ======================================================

window.addEventListener(
'resize',
()=>{

    camera.aspect =
    innerWidth / innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        innerWidth,
        innerHeight
    );

});

</script>
</body>
</html>
